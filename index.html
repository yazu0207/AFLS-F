<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFLS-ultimate</title>
<style>
body { font-family: sans-serif; background:#0b1020; color:#fff; padding:15px; }
h2,h3{margin:10px 0}
button { padding:12px 16px; margin:5px; font-size:16px; border-radius:8px; border:none; cursor:pointer; }
.container{ display:flex; gap:40px; align-items:flex-start; }
@media (max-width: 768px){ .container{ flex-direction:column; gap:10px; } }
.block{ margin-bottom:20px; }
table { border-collapse: collapse; margin:10px 0; width:100%; }

/* ★スマホ対応 */
@media (max-width: 768px){
  table, thead, tbody, th, td, tr { display: block; }
  tr { margin-bottom: 10px; border:1px solid #333; padding:5px }
  th { display:none }
  td { text-align:left; padding:5px; border:none; position:relative }
  td::before {
    content: attr(data-label);
    font-weight:bold;
    display:block;
    margin-bottom:3px;
    color:#9f9;
  }
}
td, th { border:1px solid #333; padding:6px; text-align:center; }
th { background:#222 }
.hot { background:#8b0000 }
.cold { background:#1c2a44 }
#heatmap, #output { overflow-x:auto; }
.status{font-size:12px;color:#9f9;}
</style>
</head>
<body>

<h2>AFLS-ultimate</h2>

<div class="container">
  <div class="block">
    <h3>AFLS出力データ <span id="aflsStatus" class="status">未読込</span></h3>
    <input type="file" id="aflsCsv">
  </div>

  <div class="block">
    <h3>ヒートマップデータ <span id="heatStatus" class="status">未読込</span></h3>
    <input type="file" id="heatmapCsv">
  </div>

  <div class="block">
    <h3>過去当選データ <span id="pastStatus" class="status">未読込</span></h3>
    <input type="file" id="pastCsv">
  </div>
</div>

<button id="genAfls">5x7自動生成</button>
<button id="runBtn">再構築＋照合</button>
<button id="exportCsv">結果CSV出力</button>

<h3>ヒートマップ</h3>
<div id="heatmap"></div>

<h3>結果（表形式）</h3>
<div id="output"></div>

<script type="module">
import { reconstructAFLS } from './afls3_reconstructor.js'

const aflsInput = document.getElementById('aflsCsv')
const heatmapInput = document.getElementById('heatmapCsv')
const pastInput = document.getElementById('pastCsv')
const exportBtn = document.getElementById('exportCsv')

const aflsStatus = document.getElementById('aflsStatus')
const heatStatus = document.getElementById('heatStatus')
const pastStatus = document.getElementById('pastStatus')

const heatmapDiv = document.getElementById('heatmap')
const output = document.getElementById('output')
const runBtn = document.getElementById('runBtn')
const genAflsBtn = document.getElementById('genAfls')

let latestTableData = []

function updateStatus(input, el){
  if(input.files.length > 0){ el.textContent = '読込済' }
}

[aflsInput, heatmapInput, pastInput].forEach((inp)=>{
  inp.addEventListener('change', ()=>{
    if(inp === aflsInput) updateStatus(inp, aflsStatus)
    if(inp === heatmapInput) updateStatus(inp, heatStatus)
    if(inp === pastInput) updateStatus(inp, pastStatus)
  })
})

function readFile(file){
  return new Promise(r=>{
    const fr = new FileReader()
    fr.onload=e=>r(e.target.result)
    fr.readAsText(file)
  })
}

function generateAFLS(){
  const pool = [...Array(37).keys()].map(x=>x+1)
  for(let i=pool.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1))
    ;[pool[i],pool[j]]=[pool[j],pool[i]]
  }
  const selected = pool.slice(0,35)

  while(true){
    const shuffled = [...selected]
    for(let i=shuffled.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1))
      ;[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]
    }

    const rows = []
    for(let i=0;i<5;i++){
      rows.push(shuffled.slice(i*7, i*7+7))
    }

    if(new Set(rows.flat()).size !== 35) continue
    return rows.map(r => r.sort((a,b)=>a-b))
  }
}

genAflsBtn.addEventListener('click', ()=>{
  const rows = generateAFLS()
  const header = ['A-data','n1','n2','n3','n4','n5','n6','n7'].join(',')
  const body = rows.map((r,i)=>[`m${i+1}`, ...r].join(',')).join('\n')
  const csv = header + '\n' + body

  const blob = new Blob([csv], {type:'text/csv'})
  const url = URL.createObjectURL(blob)
  const a = document.createElement('a')
  a.href = url
  a.download = 'afls_generated.csv'
  a.click()
  URL.revokeObjectURL(url)

  const file = new File([blob], 'afls_generated.csv', {type:'text/csv'})
  const dt = new DataTransfer()
  dt.items.add(file)
  aflsInput.files = dt.files
  aflsStatus.textContent = '読込済（自動生成）'
})

function saveHeatmap(text){ localStorage.setItem('heatmapCSV', text) }
function loadHeatmap(){ return localStorage.getItem('heatmapCSV') }

function parsePastCSV(text){
  return text.trim().split(/\r?\n/)
    .map(r=>r.split(',').map(v=>Number(v.trim())))
    .filter(r=>r.length>=7)
    .map(r=>r.slice(-7))
}

function renderHeatmap(cells){
  heatmapDiv.innerHTML = ''
  // ★表形式（セル分割＋列ヘッダ）
  const table = document.createElement('table')

  // ヘッダ作成
  let headerHTML = '<tr><th>Group</th>'
  for(let i=1;i<=7;i++){ headerHTML += `<th>n${i}</th>` }
  headerHTML += '<th>一致最大</th><th>回</th></tr>'
  table.innerHTML = headerHTML

  // 行作成
  latestTableData.forEach(r=>{
    const tr = document.createElement('tr')

    let rowHTML = `<td>${r.group}</td>`
    r.numbers.forEach(n=>{ rowHTML += `<td>${n}</td>` })
    rowHTML += `<td>${r.max}</td><td>${r.round}</td>`

    tr.innerHTML = rowHTML
    table.appendChild(tr)
  })

  output.innerHTML = ''
  output.appendChild(table)
})

// CSV出力
exportBtn.addEventListener('click', ()=>{
  if(!latestTableData.length) return alert('データがありません')

  const header = 'Group,Numbers,Max,Round'
  const body = latestTableData.map(r=>
    `${r.group},"${r.numbers.join(' ')}",${r.max},${r.round}`
  ).join('\n')

  const csv = header + '\n' + body
  const blob = new Blob([csv], {type:'text/csv'})
  const url = URL.createObjectURL(blob)
  const a = document.createElement('a')
  a.href = url
  a.download = 'afls_result.csv'
  a.click()
  URL.revokeObjectURL(url)
})
</script>

</body>
</html>
